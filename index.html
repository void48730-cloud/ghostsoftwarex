<!-- index.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostSoftwareX | Premium Yazılım</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* RESET & BODY */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth;}
body{background:#000;color:white;overflow-x:hidden;cursor:none;user-select:none;}
a,button,.pack{cursor:none !important;}

/* CURSOR */
.cursor{
width:18px;height:18px;
border:2px solid #00ff99;border-radius:50%;
position:fixed;pointer-events:none;
transform:translate(-50%,-50%);z-index:9999;
box-shadow:0 0 15px #00ff99;transition:transform .05s;
}

/* NAV */
nav{position:fixed;top:0;width:100%;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);border-bottom:1px solid #111;z-index:999;}
.navbox{max-width:1200px;margin:auto;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;}
.navbox h2{color:#00ff99;}
.navbox ul{display:flex;gap:25px;list-style:none;}
.navbox a{color:white;text-decoration:none;font-size:14px;opacity:.8;transition:.3s;}
.navbox a:hover{color:#00ff99;opacity:1;}
.cart-icon{
  position:relative;
  display:inline-block;
  background:#00ff99;
  color:black;
  padding:8px 15px;
  border-radius:20px;
  font-weight:600;
  font-size:14px;
  transition:.3s;
  cursor:pointer;
  text-decoration:none;
}
.cart-icon:hover{background:#00cc77;}
.cart-count{
  position:absolute;
  top:-6px;
  right:-6px;
  background:#ff4500;
  color:white;
  width:18px;
  height:18px;
  font-size:12px;
  font-weight:bold;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* HEADER */
header{text-align:center;padding:140px 20px 80px;}
header h1{font-size:48px;letter-spacing:4px;}
header span{color:#aaa}
header p{margin-top:15px;opacity:.7;}

/* MAIN */
.main{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:40px;
}

/* PRODUCT */
.product{border:1px solid #222;padding:35px;border-radius:15px;background:rgba(10,10,10,.9);backdrop-filter:blur(12px);}
.product img{width:100%;height:230px;object-fit:cover;border-radius:12px;margin-bottom:20px;}
.packages{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;}
.pack{flex:1;border:1px solid #222;padding:10px;border-radius:8px;text-align:center;transition:.3s;cursor:pointer;}
.pack.active{background:#00ff99;color:black;}
.buy a{display:inline-block;padding:12px 25px;border:1px solid #00ff99;color:#00ff99;text-decoration:none;border-radius:25px;transition:.3s;font-weight:500;}
.buy a.disabled{opacity:.4;pointer-events:none;}

/* MOBILE */
@media(max-width:900px){
.main{grid-template-columns:1fr;}
body{cursor:auto}
.cursor{display:none}
.navbox ul{display:none}
}
</style>
</head>
<body>

<div class="cursor"></div>

<nav>
<div class="navbox">
<h2>GhostX</h2>
<ul>
<li><a href="#urunler">Ürünler</a></li>
<li><a href="#neden">Neden Biz</a></li>
<li><a href="#discord">Discord</a></li>
</ul>
<a href="cart.html" class="cart-icon">
Sepet 🛒 <span class="cart-count" id="cartCount">0</span>
</a>
</div>
</nav>

<header>
<h1>Ghost<span>SoftwareX</span></h1>
<p>Premium Oyun Yazılımları & Profesyonel Destek</p>
</header>

<section id="urunler" class="main"></section>

<footer style="text-align:center;padding:25px;opacity:.5;border-top:1px solid #111;">
© 2026 GhostSoftwareX
</footer>

<script>
/* CURSOR */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* PRODUCTS DATA */
const productsData = [
{ name:"ASPECT MOD", img:"ASPECT ESP.jpeg", günlük:150, haftalık:380, aylık:760 },
{ name:"ZOLO MOD", img:"WhatsApp Image 2026-02-23 at 18.29.10.jpeg", günlük:125, haftalık:375, aylık:855 },
{ name:"REVOTECH", img:"REVO ESP.jpeg", günlük:140, haftalık:420, aylık:840 },
{ name:"KING MOD", img:"KİNG MOD.jpeg", günlük:0, haftalık:900, aylık:1700 },
{ name:"MONSTER ENGINE", img:"MONSTER ENGİNE.jpeg", günlük:140, haftalık:280, aylık:680 }
];

const main=document.querySelector(".main");
const cartCount=document.getElementById("cartCount");

function updateCartCount(){
  let cart=JSON.parse(localStorage.getItem("cart")) || [];
  cartCount.textContent=cart.length;
}

/* Render Products */
productsData.forEach(product=>{
  const div=document.createElement("div");
  div.classList.add("product");
  div.innerHTML=`
    <img src="${product.img}" alt="${product.name}">
    <h2>${product.name}</h2>
    <p>Üst seviye performans ve güvenlik.</p>
    <div class="packages">
      <div class="pack">Günlük ${product.günlük}</div>
      <div class="pack">Haftalık ${product.haftalık}</div>
      <div class="pack">Aylık ${product.aylık}</div>
    </div>
    <div class="buy"><a href="#" class="buyBtn disabled">Paket Seç</a></div>
  `;
  main.appendChild(div);

  const packs=div.querySelectorAll(".pack");
  const buyBtn=div.querySelector(".buyBtn");
  let selectedPack="";

  packs.forEach(pack=>{
    pack.addEventListener("click",()=>{
      packs.forEach(p=>p.classList.remove("active"));
      pack.classList.add("active");
      selectedPack=pack.innerText;
      buyBtn.classList.remove("disabled");
      buyBtn.textContent="Sepete Ekle";
    });
  });

  buyBtn.addEventListener("click",(e)=>{
    e.preventDefault();
    if(!selectedPack) return;
    let cart=JSON.parse(localStorage.getItem("cart"))||[];
    cart.push({name:product.name,pack:selectedPack});
    localStorage.setItem("cart",JSON.stringify(cart));
    updateCartCount();
    selectedPack="";
    buyBtn.textContent="Sepete Ekle";
  });
});

/* Load Cart Count on Page Load */
updateCartCount();
</script>
</body>
</html>
