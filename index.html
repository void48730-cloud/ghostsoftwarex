<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostSoftwareX Yeni Sistem</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {font-family: 'Poppins', sans-serif; background:#f5f5f5; margin:0; padding:0;}
    header {background:#1a1a1a; color:#fff; padding:20px; text-align:center;}
    h1 {margin:0;}
    .container {max-width:1200px; margin:20px auto; padding:0 20px;}
    .product {background:#fff; padding:15px; margin:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    .product h3 {margin:0 0 10px 0;}
    .product button {background:#007bff; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;}
    .product button:hover {background:#0056b3;}
    .cart {background:#fff; padding:15px; margin:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    #order-msg {background:#e7f3ff; padding:10px; margin:15px 0; border-radius:5px; color:#007bff;}
    input, select {padding:7px; margin:5px 0; width:100%; border-radius:5px; border:1px solid #ccc;}
    #key-display {background:#d4edda; padding:10px; margin:10px 0; border-radius:5px; color:#155724;}
  </style>
</head>
<body>

<header>
  <h1>GhostSoftwareX - Satış Sistemi</h1>
</header>

<div class="container">

  <!-- Ürünler -->
  <h2>Ürünler</h2>
  <div id="products"></div>

  <!-- Sepet -->
  <div class="cart">
    <h2>Sepetiniz</h2>
    <div id="cart-items">Sepetiniz boş.</div>
    <p>Toplam: <span id="total-price">0</span> TL</p>
    <button onclick="checkout()">Satın Al</button>
  </div>

  <!-- Satın Alma / Order Kodu Mesajı -->
  <div id="order-msg" style="display:none;"></div>

  <!-- Kullanıcı Key Görünümü -->
  <div class="cart">
    <h2>Key Görünümü</h2>
    <input type="text" id="username" placeholder="Kullanıcı adınızı girin">
    <input type="text" id="ordercode" placeholder="Order Kodunuzu girin">
    <button onclick="showKey()">Keyi Göster</button>
    <p id="key-display">Keyiniz burada görünecek.</p>
  </div>

</div>

<script>
  // 1️⃣ Ürün Verileri
  const productsData = [
    {id:"kingmod_daily", title:"King Mod - Günlük", price:150, period:"Günlük"},
    {id:"kingmod_weekly", title:"King Mod - Haftalık", price:425, period:"Haftalık"},
    {id:"kingmod_monthly", title:"King Mod - Aylık", price:760, period:"Aylık"}
  ];

  const productsEl = document.getElementById("products");
  const cartItemsEl = document.getElementById("cart-items");
  const totalPriceEl = document.getElementById("total-price");
  const orderMsgEl = document.getElementById("order-msg");

  let cart = [];

  // 2️⃣ Ürünleri Listele
  function renderProducts() {
    productsEl.innerHTML = "";
    productsData.forEach(p=>{
      const div = document.createElement("div");
      div.classList.add("product");
      div.innerHTML = `
        <h3>${p.title} - ${p.price} TL</h3>
        <p>Lisans: ${p.period}</p>
        <button onclick="addToCart('${p.id}')">Sepete Ekle</button>
      `;
      productsEl.appendChild(div);
    });
  }

  // 3️⃣ Sepete Ekle
  function addToCart(id) {
    const prod = productsData.find(p=>p.id===id);
    cart.push(prod);
    renderCart();
  }

  // 4️⃣ Sepeti Göster
  function renderCart() {
    if(cart.length===0){cartItemsEl.innerText="Sepetiniz boş."; totalPriceEl.innerText="0"; return;}
    let html = "";
    let total = 0;
    cart.forEach((p,i)=>{
      html += `<p>${i+1}. ${p.title} - ${p.price} TL</p>`;
      total += p.price;
    });
    cartItemsEl.innerHTML = html;
    totalPriceEl.innerText = total;
  }

  // 5️⃣ Satın Alma
  let orderCounter = 1; // ORDER-00001 şeklinde artacak
  function checkout() {
    if(cart.length===0){alert("Sepetiniz boş!"); return;}
    const orderCode = "ORDER-" + String(orderCounter).padStart(5,"0");
    orderCounter++;
    orderMsgEl.style.display="block";
    orderMsgEl.innerHTML = `
      Ödemeniz tamamlandı. Lütfen <strong>IBAN açıklamasına bu kodu</strong> yazın: 
      <strong>${orderCode}</strong> <br>
      Kod yazılmazsa ödemeniz geçersiz sayılır ve keyiniz teslim edilmeyecektir. <br>
      Key’iniz 1-3 saat içinde teslim edilecektir.
    `;
    cart = [];
    renderCart();
  }

  // 6️⃣ Kullanıcı Key Görünümü (Örnek)
  const keysData = [
    {username:"kullanici1", order:"ORDER-00001", key:"ABC123", delivered:true},
    {username:"kullanici2", order:"ORDER-00002", key:"DEF456", delivered:false}
  ];

  function showKey() {
    const u = document.getElementById("username").value.trim();
    const o = document.getElementById("ordercode").value.trim();
    const user = keysData.find(k=>k.username===u && k.order===o);
    if(user){
      if(user.delivered){
        document.getElementById("key-display").innerText = "Sizin keyiniz: " + user.key;
      } else {
        document.getElementById("key-display").innerText = "Key henüz teslim edilmedi, lütfen 1-3 saat bekleyin.";
      }
    } else {
      document.getElementById("key-display").innerText = "Kullanıcı veya order kodu hatalı veya key teslim edilmedi.";
    }
  }

  renderProducts();
  renderCart();
</script>

</body>
</html>
