<h1>Key Teslim</h1>

<div id="result"></div>

<script>

let cart =
JSON.parse(
localStorage.getItem("cart")
);

let keys =
JSON.parse(
localStorage.getItem("keys")
);

let product =
cart[0].name;

let key =
keys[product][0];

keys[product].shift();

localStorage.setItem(
"keys",
JSON.stringify(keys)
);

document.getElementById(
"result"
).innerText = key;

</script>
