<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş - GhostSoftwareX</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:'Poppins',sans-serif;background:#111;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;}
  .login-container{background:rgba(0,0,0,0.85);padding:40px 30px;border-radius:12px;box-shadow:0 0 20px #0ff;width:90%;max-width:400px;}
  h2{text-align:center;color:#0ff;margin-bottom:30px;text-shadow:0 0 5px #0ff,0 0 10px #0ff;}
  input{width:100%;padding:12px 15px;margin:10px 0;border:none;border-radius:8px;background:#222;color:#fff;font-size:1rem;}
  button{width:100%;padding:12px 15px;margin-top:20px;border:none;border-radius:8px;background:#0ff;color:#000;font-weight:600;font-size:1rem;cursor:pointer;transition:0.3s;}
  button:hover{box-shadow:0 0 15px #0ff;transform:scale(1.05);}
  .toggle-text{color:#0ff;text-align:center;margin-top:15px;cursor:pointer;text-decoration:underline;}
  @media(max-width:480px){.login-container{padding:30px 20px;}}
</style>
</head>
<body>

<div class="login-container">
  <h2>GhostSoftwareX Giriş</h2>

  <input type="text" id="username" placeholder="Kullanıcı Adı" required>
  <input type="password" id="password" placeholder="Şifre" required>
  <button id="login-btn">Giriş Yap</button>
  <div class="toggle-text" id="register-toggle">Kayıt olmak istiyorum</div>
</div>

<script>
  // Kayıt / Giriş toggle
  let isRegister=false;
  const toggle = document.getElementById("register-toggle");
  toggle.addEventListener("click", ()=>{
    isRegister = !isRegister;
    toggle.innerText = isRegister ? "Zaten hesabım var, giriş yap" : "Kayıt olmak istiyorum";
  });

  const loginBtn = document.getElementById("login-btn");
  loginBtn.addEventListener("click", ()=>{
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    if(!username || !password){alert("Lütfen tüm alanları doldurun!"); return;}

    if(isRegister){
      // Kayıt
      let users = JSON.parse(localStorage.getItem("users")) || [];
      if(users.find(u=>u.username===username)){alert("Bu kullanıcı adı alınmış!"); return;}
      users.push({username,password});
      localStorage.setItem("users",JSON.stringify(users));
      alert("Kayıt başarılı! Giriş yapabilirsiniz.");
      isRegister=false;
      toggle.innerText = "Kayıt olmak istiyorum";
    }else{
      // Giriş
      let users = JSON.parse(localStorage.getItem("users")) || [];
      const user = users.find(u=>u.username===username && u.password===password);
      if(user){
        localStorage.setItem("session",JSON.stringify({username}));
        window.location.href="index.html"; // Giriş sonrası yönlendirme
      }else{
        alert("Kullanıcı adı veya şifre yanlış!");
      }
    }
  });
</script>

</body>
</html>
