<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sepet | GhostSoftwareX</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{background:#000;color:white;font-family:'Poppins',sans-serif;padding:50px;}
h1{text-align:center;margin-bottom:30px;color:#00ff99;}
.cart-item{border:1px solid #222;padding:20px;border-radius:12px;margin-bottom:15px;background:rgba(10,10,10,.9);}
.cart-item p{margin:5px 0;}

/* BUTTONS */
.button-container{display:flex;justify-content:center;gap:20px;margin-top:30px;flex-wrap:wrap;}
.cart-btn{padding:12px 25px;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:.3s;text-decoration:none;color:white;text-align:center;display:inline-block;}
.cart-btn.home{background:#00ff99;color:black;}
.cart-btn.home:hover{background:#00cc77;}
.cart-btn.checkout{background:#ff4500;}
.cart-btn.checkout:hover{background:#e03e00;}
.clear-btn{display:block;width:200px;margin:20px auto;padding:10px;text-align:center;background:#555;color:white;border:none;border-radius:8px;cursor:pointer;}
.clear-btn:hover{background:#777;}
</style>
</head>
<body>

<h1>Sepetiniz</h1>
<div id="cartContainer"></div>
<button class="clear-btn" onclick="clearCart()">Sepeti Temizle</button>

<div class="button-container">
  <a href="index.html" class="cart-btn home">Ana Sayfaya Dön</a>
  <a href="checkout.html" class="cart-btn checkout">Ödemeye Devam Et</a>
</div>

<script>
function loadCart(){
  const container = document.getElementById("cartContainer");
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  container.innerHTML = "";
  if(cart.length===0){
    container.innerHTML="<p style='text-align:center;opacity:.7'>Sepetiniz boş.</p>";
    return;
  }
  cart.forEach((item,index)=>{
    const div = document.createElement("div");
    div.classList.add("cart-item");
    div.innerHTML=`<p><strong>Ürün:</strong> ${item.name}</p>
                   <p><strong>Paket:</strong> ${item.pack}</p>`;
    container.appendChild(div);
  });
}

function clearCart(){
  localStorage.removeItem("cart");
  loadCart();
}

loadCart();
</script>

</body>
</html>
